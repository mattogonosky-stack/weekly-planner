<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weekly Inbox</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e8e9ed;
    --text-muted: #8b909c;
    --yellow: #e8b339;
    --green: #4caf7d;
    --red: #e0605a;
    --blue: #5b9dd9;
    --purple: #a687e0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
  }
  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .sub { color: var(--text-muted); font-size: 13px; margin-top: 2px; }
  header nav a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 13px;
    margin-left: 16px;
    border-bottom: 1px solid transparent;
  }
  header nav a:hover { color: var(--text); border-bottom-color: var(--text-muted); }

  main { max-width: 900px; margin: 0 auto; padding: 24px; }

  #authGate {
    max-width: 420px;
    margin: 80px auto;
    text-align: center;
    color: var(--text-muted);
  }
  #authGate a { color: var(--blue); }

  .capture {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 24px;
  }
  .capture textarea {
    width: 100%;
    min-height: 64px;
    resize: vertical;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
  }
  .capture-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  select, button {
    font-family: inherit;
    font-size: 13px;
  }
  select {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
  }
  button {
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    border-radius: 6px;
    padding: 7px 12px;
    transition: background 0.15s;
  }
  button:hover { background: #262b36; }
  button.primary {
    background: var(--yellow);
    color: #1a1a1a;
    border-color: var(--yellow);
    font-weight: 600;
    margin-left: auto;
  }
  button.primary:hover { filter: brightness(1.08); }

  .section-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin: 28px 0 10px;
  }

  .item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .item.cat-bmla { border-left-color: var(--purple); }
  .item.cat-msa1 { border-left-color: var(--blue); }
  .item.cat-home { border-left-color: var(--green); }
  .item.cat-family { border-left-color: var(--yellow); }
  .item.cat-dev { border-left-color: var(--red); }
  .item.cat-other { border-left-color: var(--border); }

  .item-body { flex: 1; min-width: 0; }
  .item-content { font-size: 14px; line-height: 1.4; word-wrap: break-word; }
  .item-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 5px;
    display: flex;
    gap: 8px;
    text-transform: capitalize;
  }
  .item-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .item-actions button { padding: 5px 9px; font-size: 12px; }

  .empty {
    color: var(--text-muted);
    font-size: 13px;
    padding: 24px;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: 8px;
  }

  #archiveSection { display: none; }
  #archiveSection.open { display: block; }
  #toggleArchive {
    background: none;
    border: none;
    color: var(--text-muted);
    text-decoration: underline;
    cursor: pointer;
    font-size: 12px;
    padding: 0;
    margin-top: 24px;
  }

  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <div>
    <h1>Weekly Inbox</h1>
    <div class="sub">Everything Siri/Alexa+ or a quick note caught this week — triage it here.</div>
  </div>
  <nav><a href="./index.html">&larr; Back to planner</a></nav>
</header>

<main>
  <div id="authGate" style="display:none;">
    Not signed in. <a href="./index.html">Sign in from the main planner</a> first, then come back to this page.
  </div>

  <div id="app" style="display:none;">
    <div class="capture">
      <textarea id="newContent" placeholder="What did you catch? e.g. 'Check Act 115 electronic voting notice period before next BMLA meeting'"></textarea>
      <div class="capture-row">
        <select id="newSource">
          <option value="manual">Typed now</option>
          <option value="siri">From Siri</option>
          <option value="alexa">From Alexa+</option>
        </select>
        <select id="newCategory">
          <option value="bmla">BMLA</option>
          <option value="msa1">MSA1 / Work</option>
          <option value="home">Home / Landscaping</option>
          <option value="family">Family</option>
          <option value="dev">Dev Projects</option>
          <option value="other">Other</option>
        </select>
        <button class="primary" id="addBtn">Add to inbox</button>
      </div>
    </div>

    <div class="section-label">Needs triage</div>
    <div id="newItems"></div>

    <button id="toggleArchive">Show archived</button>
    <div id="archiveSection">
      <div class="section-label">Archived</div>
      <div id="archivedItems"></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  // ---- Same auth workaround as the main planner: the Supabase JS client's
  // getSession() hangs on GitHub Pages due to multi-instance GoTrueClient
  // conflicts, so we read the token straight from localStorage and hit the
  // REST API directly with fetch(). ----

  const SUPABASE_URL = "https://yiawbwwbhwdsqymjtrfu.supabase.co";
  // Fill in with the same anon/public key used in index.html (Settings > API in Supabase).
  const SUPABASE_ANON_KEY = "PASTE_YOUR_ANON_KEY_HERE";
  const AUTH_TOKEN_KEY = "sb-yiawbwwbhwdsqymjtrfu-auth-token";

  function getToken() {
    try {
      const raw = localStorage.getItem(AUTH_TOKEN_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      return parsed?.access_token || null;
    } catch {
      return null;
    }
  }

  function getUserId() {
    try {
      const raw = localStorage.getItem(AUTH_TOKEN_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      return parsed?.user?.id || null;
    } catch {
      return null;
    }
  }

  async function dbFetch(path, options = {}) {
    const token = getToken();
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      ...options,
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${token}`,
        "Content-Type": "application/json",
        Prefer: options.prefer || "return=representation",
        ...(options.headers || {}),
      },
    });
    if (!res.ok) {
      const text = await res.text();
      throw new Error(`${res.status}: ${text}`);
    }
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2200);
  }

  let workspaceId = null;

  function getMondayOf(date) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    d.setDate(diff);
    return d.toISOString().split("T")[0];
  }

  async function resolveWorkspace() {
    const uid = getUserId();
    const token = getToken();
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/workspace_members?select=workspace_id,role&user_id=eq.${uid}`,
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${token}` } }
    );
    if (!res.ok) throw new Error(`workspace_members ${res.status}`);
    const data = await res.json();
    if (!data.length) throw new Error("No workspace found for this user");
    const owned = data.find((r) => r.role === "owner");
    workspaceId = (owned || data[0]).workspace_id;
  }

  // Non-work categories have no home in planner_tasks' focus_area (it's
  // work-scoped: ETF/R, Control-M, Macro4, Learning, Other). MSA1 maps
  // cleanly to Learning; everything else goes to Other with a tag on the
  // title so the context isn't lost once it's sitting in the planner.
  function focusAreaFor(category) {
    return category === "msa1" ? "Learning" : "Other";
  }
  function titlePrefixFor(category) {
    const tags = { bmla: "[BMLA] ", home: "[Home] ", family: "[Family] ", dev: "[Dev] " };
    return tags[category] || "";
  }

  function catLabel(cat) {
    return { bmla: "BMLA", msa1: "MSA1 / Work", home: "Home", family: "Family", dev: "Dev", other: "Other" }[cat] || cat;
  }

  function timeAgo(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function renderItem(item, opts = {}) {
    const el = document.createElement("div");
    el.className = `item cat-${item.category}`;
    el.innerHTML = `
      <div class="item-body">
        <div class="item-content"></div>
        <div class="item-meta">
          <span>${catLabel(item.category)}</span>
          <span>&middot; via ${item.source}</span>
          <span>&middot; ${timeAgo(item.created_at)}</span>
        </div>
      </div>
      <div class="item-actions"></div>
    `;
    el.querySelector(".item-content").textContent = item.content;

    const actions = el.querySelector(".item-actions");
    if (!opts.archived) {
      const pushBtn = document.createElement("button");
      pushBtn.textContent = "→ Planner";
      pushBtn.onclick = () => pushToPlanner(item);
      const archiveBtn = document.createElement("button");
      archiveBtn.textContent = "Archive";
      archiveBtn.onclick = () => setStatus(item.id, "archived");
      actions.append(pushBtn, archiveBtn);
    } else {
      const restoreBtn = document.createElement("button");
      restoreBtn.textContent = "Restore";
      restoreBtn.onclick = () => setStatus(item.id, "new");
      actions.append(restoreBtn);
    }
    const delBtn = document.createElement("button");
    delBtn.textContent = "Delete";
    delBtn.onclick = () => deleteItem(item.id);
    actions.append(delBtn);

    return el;
  }

  async function loadItems() {
    const [newItems, archived] = await Promise.all([
      dbFetch("inbox_items?status=eq.new&order=created_at.desc"),
      dbFetch("inbox_items?status=eq.archived&order=created_at.desc"),
    ]);

    const newWrap = document.getElementById("newItems");
    newWrap.innerHTML = "";
    if (!newItems.length) {
      newWrap.innerHTML = `<div class="empty">Inbox is clear. Nothing waiting on triage.</div>`;
    } else {
      newItems.forEach((item) => newWrap.appendChild(renderItem(item)));
    }

    const archWrap = document.getElementById("archivedItems");
    archWrap.innerHTML = "";
    if (!archived.length) {
      archWrap.innerHTML = `<div class="empty">No archived items yet.</div>`;
    } else {
      archived.forEach((item) => archWrap.appendChild(renderItem(item, { archived: true })));
    }
  }

  async function addItem() {
    const content = document.getElementById("newContent").value.trim();
    if (!content) return;
    const source = document.getElementById("newSource").value;
    const category = document.getElementById("newCategory").value;
    const userId = getUserId();

    await dbFetch("inbox_items", {
      method: "POST",
      body: JSON.stringify({ content, source, category, created_by: userId }),
    });

    document.getElementById("newContent").value = "";
    showToast("Added to inbox");
    loadItems();
  }

  async function setStatus(id, status) {
    await dbFetch(`inbox_items?id=eq.${id}`, {
      method: "PATCH",
      body: JSON.stringify({ status, actioned_at: status === "actioned" ? new Date().toISOString() : null }),
    });
    showToast(status === "archived" ? "Archived" : "Restored");
    loadItems();
  }

  async function deleteItem(id) {
    await dbFetch(`inbox_items?id=eq.${id}`, { method: "DELETE", prefer: "return=minimal" });
    showToast("Deleted");
    loadItems();
  }

  // Matches the real planner_tasks schema from the weekly-planner app:
  // workspace_id, week_start, title, note, column_name, focus_area, status, updated_at.
  async function pushToPlanner(item) {
    if (!workspaceId) {
      showToast("Can't push yet — workspace not resolved. Try reloading.");
      return;
    }
    const payload = {
      workspace_id: workspaceId,
      week_start: getMondayOf(new Date()),
      title: `${titlePrefixFor(item.category)}${item.content}`.slice(0, 500),
      note: `From inbox — captured via ${item.source}`,
      column_name: "secondary",
      focus_area: focusAreaFor(item.category),
      status: "inflight",
      updated_at: new Date().toISOString(),
    };
    try {
      await dbFetch("planner_tasks", {
        method: "POST",
        body: JSON.stringify(payload),
        prefer: "return=minimal",
      });
      await setStatus(item.id, "actioned");
      showToast("Pushed to planner");
    } catch (e) {
      console.error(e);
      showToast("Couldn't push to planner — see console");
    }
  }

  document.getElementById("addBtn").addEventListener("click", addItem);
  document.getElementById("newContent").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && e.metaKey) addItem();
  });
  document.getElementById("toggleArchive").addEventListener("click", (e) => {
    const sec = document.getElementById("archiveSection");
    sec.classList.toggle("open");
    e.target.textContent = sec.classList.contains("open") ? "Hide archived" : "Show archived";
  });

  (function init() {
    if (!getToken()) {
      document.getElementById("authGate").style.display = "block";
      return;
    }
    document.getElementById("app").style.display = "block";
    resolveWorkspace().catch((e) => {
      console.error(e);
      showToast("Couldn't resolve workspace — push-to-planner will fail until reload");
    });
    loadItems().catch((e) => {
      console.error(e);
      showToast("Couldn't load inbox — check console");
    });
  })();
</script>

</body>
</html>
